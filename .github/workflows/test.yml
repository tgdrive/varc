name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "API_USAGE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "API_USAGE.md"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -count=1 ./...

      - name: Test with race detector (core library)
        run: go test -v -race -count=1 ./varc/...
